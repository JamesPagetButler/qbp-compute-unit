  gcg-root:
    name: GCG ladder — root module
    runs-on: ubuntu-latest

    # Root module covers the four non-submodule cmd/ programs:
    # cmd/{benchmark-qbp,lean2rom,locale-probe,verify-coords}/. Other
    # subdirectories (emulator/, cth/, qbp-compute-unit/, cmd/{hw-eval,
    # visualizer,wasm-visualizer}/) are separate Go modules with their
    # own go.mod and their own gcg-* jobs above (or deferred to v0.4
    # per #44).
    #
    # gofmt is module-aware via `go list -f '{{.Dir}}' ./... | xargs
    # gofmt -l`, which only emits the directories of packages in the
    # root module's package graph. This avoids descending into nested
    # modules (which are separately gated above) and avoids descending
    # into Archive/broken-go-programs/ where files carry `//go:build
    # never` build tags that filter them out before package discovery.

    steps:
      - uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version-file: go.mod

      - name: gofmt -l (gating; module-aware, root scope)
        run: |
          DIRS=$(go list -f '{{.Dir}}' ./...)
          if [ -z "$DIRS" ]; then
            echo "No Go packages in root module; skipping gofmt check."
            exit 0
          fi
          BAD=$(echo "$DIRS" | xargs gofmt -l)
          if [ -n "$BAD" ]; then
            echo "::error title=gofmt findings::Run gofmt -w on these files:"
            echo "$BAD"
            exit 1
          fi
          echo "gofmt clean."

      - name: go vet (gating)
        run: go vet ./...

      - name: go test -race -count=1 (gating)
        run: go test -race -count=1 ./...

      - name: go mod tidy is no-op (gating)
