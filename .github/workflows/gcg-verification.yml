# GCG Verification Ladder — Go Coding Guide enforcement in CI.
#
# Closes part of issue #17. Enforces the verification ladder mandated by
# `~/Documents/go-coding-guide.md` so agent-self-attestation + reviewer
# discipline are no longer the only gate.
#
# Scope at v0.1 (this workflow): emulator/ only — the Wyrd-consumed substrate
# where the Gearbox guarantees live. Other modules (cmd/, qbp-compute-unit/,
# cth/) have pre-existing gofmt backlogs (~67 files); enabling gating across
# the repo would produce a queue of small cleanup PRs that should land
# separately. Staged rollout:
#
#   v0.1 (this commit): emulator/ — currently clean on all 4 gating gates
#   v0.2 (follow-up):   cmd/ + qbp-compute-unit/ + cth/ after baseline cleanup
#
# Four gating gates + one informational:
#
#   GATING                                             EVIDENCE
#   gofmt -l . (empty)                                 — verified clean today
#   go vet ./...                                       — verified clean today
#   go test -race -count=1 ./...                       — verified PASS 1.0s
#   go mod tidy → no go.mod diff                       — verified no-op today
#
#   INFORMATIONAL (continue-on-error; promotable later)
#   staticcheck ./...                                  — findings allowed at v0.1

name: GCG Verification Ladder

on: [push, pull_request]

permissions:
  contents: read

jobs:
  gcg-emulator:
    name: GCG ladder — emulator/
    runs-on: ubuntu-latest

    defaults:
      run:
        working-directory: emulator

    steps:
      - uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version-file: emulator/go.mod

      - name: gofmt -l (gating; emulator/ scope)
        run: |
          BAD=$(gofmt -l .)
          if [ -n "$BAD" ]; then
            echo "::error title=gofmt findings::Run gofmt -w . inside emulator/ to fix:"
            echo "$BAD"
            exit 1
          fi
          echo "gofmt clean."

      - name: go vet (gating)
        run: go vet ./...

      - name: go test -race -count=1 (gating)
        run: go test -race -count=1 ./...

      - name: go mod tidy is no-op (gating)
        run: |
          cp go.mod go.mod.before
          # Also copy go.sum if it exists
          [ -f go.sum ] && cp go.sum go.sum.before || true
          go mod tidy
          if ! diff -q go.mod.before go.mod > /dev/null; then
            echo "::error title=go.mod not tidy::Run 'go mod tidy' locally and commit the changes."
            diff go.mod.before go.mod || true
            exit 1
          fi
          if [ -f go.sum.before ] && ! diff -q go.sum.before go.sum > /dev/null; then
            echo "::error title=go.sum not tidy::Run 'go mod tidy' locally and commit the changes."
            diff go.sum.before go.sum || true
            exit 1
          fi
          rm -f go.mod.before go.sum.before
          echo "go mod tidy is a no-op."

      - name: staticcheck (informational; promotable to gating)
        continue-on-error: true
        run: |
          go install honnef.co/go/tools/cmd/staticcheck@latest
          staticcheck ./...
