name: Go CTH CI

on:
  push:
    branches: [ "main" ]
    paths:
      - 'cth/**'
  pull_request:
    branches: [ "main" ]
    paths:
      - 'cth/**'

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4

    - name: Set up Go
      uses: actions/setup-go@v4
      with:
        go-version: '1.22'

    - name: Build
      run: cd cth && go build -v ./...

    - name: Test
      run: cd cth && go test -v ./...
